<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | V-Agro Serviços</title>
    <link rel="stylesheet" th:href="@{/css/login_style.css}">
</head>
<body>

    <div class="login-container">
        <div class="brand-logo">V-Agro</div>
        <div class="login-header">
            <h2>Painel de Gestão</h2>
        </div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label for="username">Usuário</label>
                <input type="text" id="username" name="username" placeholder="Digite seu usuário" required autofocus>
            </div>
            
            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" id="password" name="password" placeholder="Digite sua senha" required>
            </div>

            <button type="submit" class="btn-login">Entrar no Sistema</button>
        </form>

        <a th:href="@{/}" class="back-link">← Voltar para o Site</a>
        
        <div class="v-agro-badge">8 Anos de Excelência</div>
    </div>

</body>
</html>
